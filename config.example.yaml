# Dual setup (on-prem + Cloud): use separate connections and token env vars.
#   corp  → JIRA_PAT (Server PAT, no email)
#   cloud → ATLASSIAN_CLOUD_EMAIL + JIRA_CLOUD_PAT (from id.atlassian.com)

default_connection: corp

connections:
  # On-prem: Jira Server + Bitbucket Server (+ optional Confluence Server)
  corp:
    jira:
      flavor: server
      url: https://jira.example.com
      token_env: JIRA_PAT
    bitbucket:
      flavor: server
      url: https://bitbucket.example.com
      username_env: BITBUCKET_USERNAME
      token_env: BITBUCKET_TOKEN
    # confluence:
    #   flavor: server
    #   url: https://confluence.example.com
    #   token_env: CONFLUENCE_PAT

  # Atlassian Cloud: Confluence (+ optional Jira Cloud, Bitbucket Cloud)
  cloud:
    confluence:
      flavor: cloud
      url: https://your-org.atlassian.net
      email_env: ATLASSIAN_CLOUD_EMAIL
      token_env: JIRA_CLOUD_PAT
      # Scoped tokens (ATATT3x): cloud_id auto-fetched from /_edge/tenant_info, or set explicitly:
      # cloud_id_env: CONFLUENCE_CLOUD_ID
    jira:
      flavor: cloud
      url: https://your-org.atlassian.net
      email_env: ATLASSIAN_CLOUD_EMAIL
      token_env: JIRA_CLOUD_PAT
    bitbucket:
      flavor: cloud
      workspace: your-workspace
      username_env: BITBUCKET_USERNAME
      token_env: BITBUCKET_TOKEN
